<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="مؤسسة أدوال للمصاعد - تركيب وصيانة وقطع غيار المصاعد في المملكة العربية السعودية" />
  <title>أدوال للمصاعد | ADAWAL Est.</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=Tajawal:wght@300;400;500;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C9A84C; --gold-light: #E8C97A; --gold-dark: #8B6914;
      --brown: #1E4D6B; --brown-dark: #0F2E42; --brown-deep: #081A26;
      --cream: #F5EDD8; --cream2: #EDE0C4; --cream3: #D4C49A;
      --dark: #12151C; --dark2: #181C26; --dark3: #1E2330; --dark4: #242A3A;
      --border: rgba(201,168,76,0.25); --border2: rgba(201,168,76,0.12);
      --text: #F5EDD8; --text-muted: #B8A882;
      --success: #2ECC71; --warning: #F39C12; --info: #3498DB;
    }
    body { font-family: 'Cairo', sans-serif; background: var(--dark); color: var(--text); direction: rtl; }
    .app { min-height: 100vh; background: var(--dark); }
    .header { background: linear-gradient(135deg, var(--brown-dark) 0%, var(--brown) 60%, var(--brown-dark) 100%); border-bottom: 3px solid var(--gold); padding: 0 2rem; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
    .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 80px; }
    .logo { display: flex; align-items: center; gap: 14px; }
    .logo-icon { width: 52px; height: 52px; background: linear-gradient(145deg, var(--cream2), var(--cream)); border-radius: 10px; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 12px rgba(0,0,0,0.3); flex-direction: column; gap: 0; }
    .logo-icon-ad { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 1.3rem; color: var(--brown-dark); line-height: 1; }
    .logo-icon-line { width: 36px; height: 2px; background: var(--gold-dark); margin: 2px 0; }
    .logo-icon-sub { font-family: 'Cairo', sans-serif; font-size: 0.45rem; font-weight: 700; color: var(--brown); letter-spacing: 0.5px; }
    .logo-text-wrap { display: flex; flex-direction: column; gap: 1px; }
    .logo-ar { font-family: 'Tajawal', sans-serif; font-weight: 900; font-size: 1.1rem; color: var(--cream); line-height: 1.2; }
    .logo-en { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 0.85rem; color: var(--gold-light); letter-spacing: 1px; }
    .logo-tagline { font-size: 0.65rem; color: var(--cream3); letter-spacing: 0.5px; margin-top: 1px; }
    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .header-badge { background: rgba(0,0,0,0.25); border: 1px solid rgba(201,168,76,0.4); border-radius: 20px; padding: 4px 12px; font-size: 0.75rem; color: var(--gold-light); white-space: nowrap; }
    .header-services { display: flex; gap: 8px; }
    .service-pill { background: rgba(0,0,0,0.2); border: 1px solid rgba(245,237,216,0.15); border-radius: 12px; padding: 3px 10px; font-size: 0.68rem; color: var(--cream3); }
    .nav { background: var(--dark2); border-bottom: 2px solid var(--gold-dark); padding: 0 2rem; overflow-x: auto; }
    .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; gap: 0; }
    .nav-btn { display: flex; align-items: center; gap: 8px; padding: 14px 18px; border: none; background: none; cursor: pointer; color: var(--text-muted); font-family: 'Cairo', sans-serif; font-size: 0.85rem; font-weight: 500; border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap; margin-bottom: -2px; }
    .nav-btn:hover { color: var(--cream); }
    .nav-btn.active { color: var(--gold-light); border-bottom-color: var(--gold); background: rgba(201,168,76,0.06); }
    .main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .card { background: var(--dark2); border: 1px solid var(--border2); border-top: 2px solid var(--gold-dark); border-radius: 14px; padding: 1.8rem; margin-bottom: 1.5rem; box-shadow: 0 2px 16px rgba(0,0,0,0.3); }
    .card-title { font-family: 'Tajawal', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--gold-light); margin-bottom: 1.2rem; display: flex; align-items: center; gap: 8px; padding-bottom: 0.8rem; border-bottom: 1px solid var(--border2); }
    .form-grid { display: grid; gap: 1.2rem; }
    .form-grid-2 { grid-template-columns: 1fr 1fr; }
    @media (max-width: 700px) { .form-grid-2 { grid-template-columns: 1fr; } .header-services { display: none; } .nav-btn { padding: 12px 10px; font-size: 0.75rem; } }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
    .form-label span { color: #e74c3c; margin-right: 3px; }
    .form-input, .form-select, .form-textarea { background: var(--dark3); border: 1px solid rgba(201,168,76,0.2); border-radius: 10px; padding: 11px 14px; color: var(--text); font-family: 'Cairo', sans-serif; font-size: 0.9rem; outline: none; transition: border 0.2s; width: 100%; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(201,168,76,0.1); }
    .form-select option { background: var(--dark3); }
    .form-textarea { resize: vertical; min-height: 90px; }
    .options-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .option-card { background: var(--dark3); border: 2px solid rgba(201,168,76,0.15); border-radius: 12px; padding: 14px 12px; cursor: pointer; transition: all 0.2s; text-align: center; font-size: 0.85rem; }
    .option-card:hover { border-color: rgba(201,168,76,0.4); }
    .option-card.selected { border-color: var(--gold); background: rgba(30,77,107,0.3); box-shadow: 0 0 0 1px rgba(201,168,76,0.2); }
    .option-card-icon { font-size: 1.8rem; margin-bottom: 6px; }
    .option-card-label { font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .option-card-sub { font-size: 0.75rem; color: var(--text-muted); }
    .range-group { display: flex; flex-direction: column; gap: 8px; }
    .range-header { display: flex; justify-content: space-between; align-items: center; }
    .range-value { background: linear-gradient(135deg, var(--brown-dark), var(--brown)); border: 1px solid var(--gold-dark); color: var(--gold-light); font-weight: 700; font-size: 0.85rem; padding: 3px 10px; border-radius: 20px; }
    input[type=range] { width: 100%; accent-color: var(--gold); cursor: pointer; height: 6px; }
    .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(201,168,76,0.06); }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-info { flex: 1; }
    .toggle-title { font-weight: 600; font-size: 0.9rem; }
    .toggle-desc { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; }
    .toggle-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; margin-right: 8px; font-weight: 600; }
    .badge-req { background: rgba(30,77,107,0.4); color: #7ecbe8; border: 1px solid rgba(126,203,232,0.3); }
    .badge-opt { background: rgba(52,152,219,0.15); color: #3498db; }
    .toggle { position: relative; width: 46px; height: 26px; background: var(--dark4); border-radius: 13px; cursor: pointer; transition: background 0.3s; border: 1px solid rgba(201,168,76,0.2); flex-shrink: 0; }
    .toggle.on { background: var(--brown); border-color: var(--gold-dark); }
    .toggle::after { content: ''; position: absolute; width: 20px; height: 20px; border-radius: 50%; background: var(--text-muted); top: 2px; right: 2px; transition: all 0.3s; }
    .toggle.on::after { background: var(--gold-light); right: 22px; }
    .standards-list { display: flex; flex-direction: column; gap: 10px; }
    .standard-item { background: var(--dark3); border-radius: 12px; padding: 14px 16px; border: 1px solid rgba(201,168,76,0.12); display: flex; gap: 14px; align-items: flex-start; }
    .standard-icon { width: 38px; height: 38px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
    .icon-green { background: rgba(46,204,113,0.12); } .icon-blue { background: rgba(52,152,219,0.12); } .icon-orange { background: rgba(201,168,76,0.12); } .icon-red { background: rgba(30,77,107,0.3); }
    .standard-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 4px; }
    .standard-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.5; }
    .standard-tag { display: inline-block; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; margin-top: 6px; font-weight: 600; background: rgba(30,77,107,0.3); color: var(--gold-light); border: 1px solid rgba(201,168,76,0.2); }
    .tracking-search { display: flex; gap: 10px; margin-bottom: 1.5rem; }
    .tracking-search .form-input { flex: 1; }
    .btn-search { background: linear-gradient(135deg, var(--brown-dark), var(--brown)); border: 1px solid var(--gold-dark); border-radius: 10px; padding: 11px 20px; color: var(--gold-light); font-family: 'Cairo', sans-serif; font-weight: 700; cursor: pointer; font-size: 0.9rem; white-space: nowrap; }
    .order-card { background: var(--dark3); border: 1px solid rgba(201,168,76,0.15); border-radius: 14px; padding: 1.4rem; margin-bottom: 1rem; }
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .order-id { font-weight: 700; font-size: 1rem; }
    .order-id span { color: var(--gold-light); }
    .status-badge { padding: 5px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; }
    .status-review { background: rgba(243,156,18,0.15); color: #F39C12; }
    .status-install { background: rgba(46,204,113,0.15); color: #2ECC71; }
    .progress-steps { display: flex; gap: 0; margin: 1rem 0; }
    .step { flex: 1; text-align: center; position: relative; }
    .step::before { content: ''; position: absolute; top: 14px; right: 50%; width: 100%; height: 2px; background: var(--dark4); }
    .step:first-child::before { display: none; }
    .step-circle { width: 28px; height: 28px; border-radius: 50%; background: var(--dark4); border: 2px solid rgba(201,168,76,0.2); display: flex; align-items: center; justify-content: center; margin: 0 auto 6px; font-size: 0.75rem; font-weight: 700; position: relative; z-index: 1; }
    .step.done .step-circle { background: var(--brown); border-color: var(--gold-dark); color: var(--gold-light); }
    .step.done::before { background: var(--brown); }
    .step.active .step-circle { background: rgba(30,77,107,0.3); border-color: var(--gold); color: var(--gold-light); }
    .step-label { font-size: 0.72rem; color: var(--text-muted); }
    .step.done .step-label, .step.active .step-label { color: var(--text); }
    .btn-primary { background: linear-gradient(135deg, var(--brown-dark), var(--brown)); border: 1px solid var(--gold-dark); border-radius: 12px; padding: 13px 28px; color: var(--gold-light); font-family: 'Cairo', sans-serif; font-weight: 700; cursor: pointer; font-size: 0.95rem; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .btn-primary:hover { opacity: 0.9; border-color: var(--gold); }
    .btn-outline { background: transparent; border: 1px solid rgba(201,168,76,0.2); border-radius: 12px; padding: 12px 24px; color: var(--text-muted); font-family: 'Cairo', sans-serif; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
    .btn-outline:hover { border-color: var(--gold-dark); color: var(--text); }
    .btn-row { display: flex; gap: 12px; justify-content: flex-start; margin-top: 1.5rem; }
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: rgba(201,168,76,0.1); border-radius: 10px; overflow: hidden; }
    .summary-item { background: var(--dark3); padding: 12px 16px; }
    .summary-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; }
    .summary-value { font-weight: 600; font-size: 0.9rem; }
    .alert { border-radius: 12px; padding: 14px 16px; display: flex; gap: 12px; align-items: flex-start; margin-bottom: 1rem; }
    .alert-gold { background: rgba(30,77,107,0.15); border: 1px solid rgba(201,168,76,0.25); }
    .alert-blue { background: rgba(52,152,219,0.08); border: 1px solid rgba(52,152,219,0.25); }
    .alert-icon { font-size: 1.2rem; flex-shrink: 0; }
    .alert-text { font-size: 0.85rem; line-height: 1.6; color: var(--text-muted); }
    .alert-text strong { color: var(--text); }
    .hero { background: linear-gradient(135deg, var(--brown-dark) 0%, var(--dark3) 100%); border: 1px solid rgba(201,168,76,0.2); border-right: 4px solid var(--gold); border-radius: 14px; padding: 2rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 2rem; position: relative; overflow: hidden; }
    .hero-text h2 { font-family: 'Tajawal', sans-serif; font-size: 1.6rem; font-weight: 900; margin-bottom: 8px; }
    .hero-text h2 span { color: var(--gold-light); }
    .hero-text p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.7; }
    .hero-art { font-size: 4rem; flex-shrink: 0; background: rgba(30,77,107,0.25); border: 1px solid rgba(201,168,76,0.2); border-radius: 16px; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; }
    .wizard-steps { display: flex; gap: 0; margin-bottom: 2rem; background: var(--dark2); border-radius: 12px; overflow: hidden; border: 1px solid rgba(201,168,76,0.15); }
    .wizard-step { flex: 1; padding: 12px; text-align: center; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); border-left: 1px solid rgba(201,168,76,0.1); cursor: pointer; transition: all 0.2s; }
    .wizard-step:last-child { border-left: none; }
    .wizard-step.active { background: rgba(30,77,107,0.25); color: var(--gold-light); }
    .wizard-step.completed { color: var(--success); }
    .wizard-step-num { display: block; font-size: 1.1rem; margin-bottom: 2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const initialFeatures = {
  emergency: true, intercom: true, cctv: false,
  overload: true, vip_card: false, remote_monitor: false,
  auto_rescue: true, energy_saving: false, music: false,
};

function App() {
  const [tab, setTab] = useState("request");
  const [step, setStep] = useState(1);
  const [features, setFeatures] = useState(initialFeatures);
  const [elevatorType, setElevatorType] = useState("passenger");
  const [cabinStyle, setCabinStyle] = useState("classic");
  const [floors, setFloors] = useState(8);
  const [speed, setSpeed] = useState("1.0");
  const [capacity, setCapacity] = useState("630");
  const [trackId, setTrackId] = useState("");
  const [showOrder, setShowOrder] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [maintStep, setMaintStep] = useState(1);
  const [maintSubmitted, setMaintSubmitted] = useState(false);
  const [maintType, setMaintType] = useState("periodic");
  const [maintProblems, setMaintProblems] = useState([]);

  const toggleFeature = (key) => {
    if (["emergency","overload","auto_rescue"].includes(key)) return;
    setFeatures(f => ({ ...f, [key]: !f[key] }));
  };
  const toggleProblem = (p) => setMaintProblems(prev =>
    prev.includes(p) ? prev.filter(x => x !== p) : [...prev, p]
  );

  const tabs = [
    { id: "request", label: "طلب مصعد جديد", icon: "🏗️" },
    { id: "maintenance", label: "طلب صيانة", icon: "🔧" },
    { id: "specs", label: "المواصفات", icon: "⚙️" },
    { id: "standards", label: "الشروط السعودية", icon: "🛡️" },
    { id: "track", label: "متابعة الطلب", icon: "📍" },
  ];

  return (
    <div className="app">
      <header className="header">
        <div className="header-inner">
          <div className="logo">
            <div className="logo-icon">
              <div className="logo-icon-ad">Ad</div>
              <div className="logo-icon-line"></div>
              <div className="logo-icon-sub">أدوال للمصاعد</div>
            </div>
            <div className="logo-text-wrap">
              <div className="logo-ar">مؤسسة أدوال للمصاعد</div>
              <div className="logo-en">ADAWAL Est.</div>
              <div className="logo-tagline">خبرات فنية متميزة · خدمة 24 ساعة</div>
            </div>
          </div>
          <div className="header-right">
            <div className="header-badge">🇸🇦 متوافق مع SASO</div>
            <div className="header-services">
              <span className="service-pill">🏗️ تركيب</span>
              <span className="service-pill">🔧 صيانة</span>
              <span className="service-pill">⚙️ قطع غيار</span>
            </div>
          </div>
        </div>
      </header>

      <nav className="nav">
        <div className="nav-inner">
          {tabs.map(t => (
            <button key={t.id} className={`nav-btn ${tab === t.id ? "active" : ""}`} onClick={() => setTab(t.id)}>
              <span>{t.icon}</span>{t.label}
            </button>
          ))}
        </div>
      </nav>

      <main className="main">

        {/* ===== TAB: طلب مصعد جديد ===== */}
        {tab === "request" && !submitted && (
          <>
            <div className="hero">
              <div className="hero-art">🏢</div>
              <div className="hero-text">
                <h2>اطلب مصعدك <span>المثالي</span></h2>
                <p>أدخل بيانات مبناك ومتطلباتك، وسنقوم بتجهيز عرض سعر متوافق مع الشروط السعودية خلال 24 ساعة.</p>
              </div>
            </div>
            <div className="wizard-steps">
              {["بيانات المبنى","بيانات المالك","ملاحظات"].map((s,i) => (
                <div key={i} className={`wizard-step ${step===i+1?"active":step>i+1?"completed":""}`} onClick={() => setStep(i+1)}>
                  <span className="wizard-step-num">{step>i+1?"✓":i+1}</span>{s}
                </div>
              ))}
            </div>

            {step === 1 && (
              <div className="card">
                <div className="card-title">🏗️ بيانات المبنى</div>
                <div className="form-grid form-grid-2">
                  <div className="form-group"><label className="form-label">نوع المبنى <span>*</span></label>
                    <select className="form-select"><option>سكني - شقق</option><option>تجاري - مكاتب</option><option>فيلا خاصة</option><option>فندق</option><option>مستشفى / عيادات</option><option>مخزن / مستودع</option></select>
                  </div>
                  <div className="form-group"><label className="form-label">المدينة <span>*</span></label>
                    <select className="form-select"><option>الرياض</option><option>جدة</option><option>مكة المكرمة</option><option>المدينة المنورة</option><option>الدمام</option><option>الخبر</option><option>أبها</option><option>تبوك</option><option>أخرى</option></select>
                  </div>
                  <div className="form-group"><label className="form-label">عدد الطوابق <span>*</span></label>
                    <input className="form-input" type="number" min="2" max="100" defaultValue="8" />
                  </div>
                  <div className="form-group"><label className="form-label">عدد المصاعد <span>*</span></label>
                    <select className="form-select"><option>1 مصعد</option><option>2 مصعد</option><option>3 مصاعد</option><option>4 أو أكثر</option></select>
                  </div>
                  <div className="form-group"><label className="form-label">حالة البناء</label>
                    <select className="form-select"><option>قيد الإنشاء</option><option>مكتمل ويحتاج مصعد</option><option>استبدال مصعد قديم</option></select>
                  </div>
                  <div className="form-group"><label className="form-label">الموعد المطلوب للتركيب</label>
                    <input className="form-input" type="date" />
                  </div>
                </div>
                <div className="btn-row"><button className="btn-primary" onClick={() => setStep(2)}>التالي ←</button></div>
              </div>
            )}

            {step === 2 && (
              <div className="card">
                <div className="card-title">👤 بيانات المالك</div>
                <div className="form-grid form-grid-2">
                  <div className="form-group"><label className="form-label">الاسم الكامل <span>*</span></label><input className="form-input" type="text" placeholder="الاسم الرباعي" /></div>
                  <div className="form-group"><label className="form-label">رقم الجوال <span>*</span></label><input className="form-input" type="tel" placeholder="05XXXXXXXX" dir="ltr" /></div>

                    <div><div className="standard-title">{s.title}</div><div className="standard-desc">{s.desc}</div><span className="standard-tag">{s.tag}</span></div>
                  </div>
                ))}
              </div>
            </div>
            <div className="card">
              <div className="card-title">🏛️ كود البناء السعودي (SBC)</div>
              <div className="standards-list">
                {[
                  {icon:"♿",cls:"icon-green",title:"ذوو الاحتياجات الخاصة",desc:"مصعد مناسب لكراسي العجلات بأبعاد 110×140 سم وأزرار برايل في المباني العامة.",tag:"SBC 1101"},
                  {icon:"🔥",cls:"icon-red",title:"مصعد الإطفاء",desc:"في المباني أعلى من 15م يجب مصعد مخصص لرجال الإطفاء مع غرفة تحكم محمية.",tag:"SBC 1001 الفصل 30"},
                  {icon:"📏",cls:"icon-blue",title:"حجم حجرة المصعد",desc:"الحد الأدنى: عرض 1.60م × عمق 1.60م للمصاعد السكنية.",tag:"SBC 1001"},
                  {icon:"🛗",cls:"icon-orange",title:"عدد المصاعد المطلوب",desc:"يُحدد وفق عدد السكان أو المستخدمين المتوقعين وفق جداول SBC.",tag:"SBC 1001 - الجدول 30.1"},
                ].map((s,i) => (
                  <div className="standard-item" key={i}>
                    <div className={`standard-icon ${s.cls}`}>{s.icon}</div>
                    <div><div className="standard-title">{s.title}</div><div className="standard-desc">{s.desc}</div><span className="standard-tag">{s.tag}</span></div>
                  </div>
                ))}
              </div>
            </div>
            <div className="card">
              <div className="card-title">📄 الوثائق المطلوبة للتركيب</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                {[["📋","رخصة البناء","من الأمانة / البلدية"],["🏗️","مخططات البئر","معتمدة من مهندس مرخص"],["✅","شهادة SASO للجهاز","من الوكيل المعتمد"],["🔍","فحص ما قبل التشغيل","من جهة فحص معتمدة"],["📝","عقد الصيانة السنوية","تجديد سنوي إلزامي"],["🆔","لوحة البيانات الرسمية","داخل الكابينة"]].map(([icon,title,sub],i) => (
                  <div key={i} style={{background:"var(--dark3)",borderRadius:"10px",padding:"12px",border:"1px solid var(--border2)",display:"flex",gap:"10px",alignItems:"center"}}>
                    <span style={{fontSize:"1.5rem"}}>{icon}</span>
                    <div><div style={{fontWeight:600,fontSize:"0.85rem"}}>{title}</div><div style={{fontSize:"0.75rem",color:"var(--text-muted)",marginTop:"2px"}}>{sub}</div></div>
                  </div>
                ))}
              </div>
            </div>
          </>
        )}

        {/* ===== TAB: متابعة الطلب ===== */}
        {tab === "track" && (
          <>
            <div className="card">
              <div className="card-title">🔍 تتبع حالة الطلب</div>
              <div className="tracking-search">
                <input className="form-input" type="text" placeholder="أدخل رقم الطلب مثال: REQ-2024-0847" dir="ltr" value={trackId} onChange={e => setTrackId(e.target.value)} />
                <button className="btn-search" onClick={() => setShowOrder(true)}>بحث</button>
              </div>
              {(showOrder || submitted) && (
                <>
                  <div className="order-card">
                    <div className="order-header"><div className="order-id">طلب رقم <span>REQ-2024-0847</span></div><div className="status-badge status-review">⏳ قيد المراجعة</div></div>
                    <div className="progress-steps">
                      {["استلام","مراجعة","موافقة","تصنيع","تركيب","تسليم"].map((s,i) => (
                        <div key={i} className={`step ${i<1?"done":i===1?"active":""}`}>
                          <div className="step-circle">{i<1?"✓":i+1}</div><div className="step-label">{s}</div>
                        </div>
                      ))}
                    </div>
                    <div className="summary-grid" style={{marginTop:"1rem"}}>
                      {[["نوع المبنى","سكني - شقق"],["المدينة","الرياض"],["عدد الطوابق","10"],["عدد المصاعد","2"],["تاريخ الطلب","2024/11/15"],["آخر تحديث","2024/11/15"]].map(([l,v]) => (
                        <div className="summary-item" key={l}><div className="summary-label">{l}</div><div className="summary-value">{v}</div></div>
                      ))}
                    </div>
                  </div>
                  <div className="order-card">
                    <div className="order-header"><div className="order-id">طلب رقم <span>REQ-2024-0612</span></div><div className="status-badge status-install">🔧 قيد التركيب</div></div>
                    <div className="progress-steps">
                      {["استلام","مراجعة","موافقة","تصنيع","تركيب","تسليم"].map((s,i) => (
                        <div key={i} className={`step ${i<4?"done":i===4?"active":""}`}>
                          <div className="step-circle">{i<4?"✓":i+1}</div><div className="step-label">{s}</div>
                        </div>
                      ))}
                    </div>
                    <div className="summary-grid" style={{marginTop:"1rem"}}>
                      {[["نوع المبنى","فيلا خاصة"],["المدينة","جدة"],["نوع المصعد","بانورامي"],["السرعة","0.63 م/ث"],["تاريخ الطلب","2024/09/03"],["التسليم المتوقع","2024/12/01"]].map(([l,v]) => (
                        <div className="summary-item" key={l}><div className="summary-label">{l}</div><div className="summary-value">{v}</div></div>
                      ))}
                    </div>
                  </div>
                </>
              )}
              {!showOrder && !submitted && (
                <div style={{textAlign:"center",padding:"2.5rem",color:"var(--text-muted)"}}>
                  <div style={{fontSize:"3rem",marginBottom:"1rem"}}>🔍</div>
                  <p>أدخل رقم الطلب للاستعلام عن حالته</p>
                </div>
              )}
            </div>
            <div className="card">
              <div className="card-title">📞 تواصل معنا</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px"}}>
                {[{icon:"📱",title:"واتساب",sub:"0558766199",color:"#25D366"},{icon:"📞",title:"هاتف",sub:"6796468",color:"#3498db"},{icon:"✉️",title:"بريد إلكتروني",sub:"adwal.lifts@hotmail.com",color:"var(--gold)"}].map((c,i) => (
                  <div key={i} style={{background:"var(--dark3)",borderRadius:"12px",padding:"16px",textAlign:"center",border:"1px solid var(--border2)",cursor:"pointer"}}>
                    <div style={{fontSize:"2rem",marginBottom:"6px"}}>{c.icon}</div>
                    <div style={{fontWeight:700,fontSize:"0.9rem",color:c.color}}>{c.title}</div>
                    <div style={{fontSize:"0.75rem",color:"var(--text-muted)",marginTop:"3px"}}>{c.sub}</div>
                  </div>
                ))}
              </div>
            </div>
          </>
        )}

      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
